
<div style="padding: 1rem 0;">
  <div style="display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 12px; font-size: 13px; color: var(--text-secondary);">
    <span style="display: flex; align-items: center; gap: 5px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #e34948;"></span>Antes</span>
    <span style="display: flex; align-items: center; gap: 5px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #008300;"></span>Después</span>
  </div>
  <div style="position: relative; width: 100%; height: 340px;">
    <canvas id="chart" role="img" aria-label="Gráfica de barras agrupadas comparando tiempos antes y después de la implementación para 4 actividades">Búsqueda del cliente: 15 vs 2 min. Publicación de prenda: 17 vs 5 min. Actualizar prenda como vendida: 5 vs 1 min. Contactar al vendedor: 5 vs 1 min.</canvas>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const ctx = document.getElementById('chart');
const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
const gridC = isDark ? '#2c2c2a' : '#e1e0d9';
const tickC = isDark ? '#898781' : '#898781';
new Chart(ctx, {
  type: 'bar',
  data: {
    labels: ['Búsqueda del\ncliente', 'Publicación\nde prenda', 'Actualizar prenda\ncomo vendida', 'Contactar\nal vendedor'],
    datasets: [
      { label: 'Antes (min)', data: [15, 17, 5, 5], backgroundColor: '#e34948', borderRadius: { topLeft: 4, topRight: 4 }, maxBarThickness: 24 },
      { label: 'Después (min)', data: [2, 5, 1, 1], backgroundColor: '#008300', borderRadius: { topLeft: 4, topRight: 4 }, maxBarThickness: 24 }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: { label: c => c.dataset.label + ': ' + c.parsed.y + ' min' }
      }
    },
    scales: {
      x: {
        ticks: { color: tickC, font: { size: 12 }, autoSkip: false, maxRotation: 0 },
        grid: { display: false },
        border: { color: isDark ? '#383835' : '#c3c2b7' }
      },
      y: {
        beginAtZero: true,
        title: { display: true, text: 'Minutos', color: tickC, font: { size: 13 } },
        ticks: { color: tickC, stepSize: 5 },
        grid: { color: gridC },
        border: { display: false }
      }
    }
  }
});
</script>
